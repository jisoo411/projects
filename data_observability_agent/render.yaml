services:
  - type: web
    name: pipeline-observability-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: standard
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false          # Neon pipeline_watch DB — set in Render dashboard
      - key: SOURCE_DATABASE_URL
        sync: false          # Neon source_data DB — set in Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: AIRFLOW_BASE_URL
        sync: false
      - key: AIRFLOW_TOKEN
        sync: false
      - key: AUDIT_HMAC_SECRET
        sync: false
      - key: API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://pipeline-observability.vercel.app
      - key: MAX_CONCURRENT_LIVE_CHECKS
        value: "3"
      - key: MAX_LOG_PAGES
        value: "5"
      - key: CONFIDENCE_THRESHOLD
        value: "0.7"
      - key: RERANK_FALLBACK_THRESHOLD
        value: "0.5"
      - key: STATEMENT_TIMEOUT_MS
        value: "10000"
      - key: OPENAI_MAX_RETRIES
        value: "2"
      - key: SSE_HEARTBEAT_INTERVAL_S
        value: "15"
      - key: INGEST_INTERVAL_MINUTES
        value: "15"
